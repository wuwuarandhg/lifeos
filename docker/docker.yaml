services:
  lifeos:
    image: ghcr.io/wuwuarandhg/lifeos:v1.0.4
    container_name: lifeos
    ports:
      - "${PORT:-8060}:8060"
    volumes:
      - ./data:/app/data
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-changeme}
      NODE_ENV: development
      DATABASE_PATH: /app/data/lifeos.db
      ATTACHMENTS_PATH: /app/data/attachments
      PORT: 8060
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8060/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
