services:
  lifeos:
    image: ghcr.io/wuwuarandhg/lifeos:v1.0.2
    container_name: lifeos
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ../data:/app/data
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-changeme}
      NODE_ENV: production
      DATABASE_PATH: /app/data/lifeos.db
      ATTACHMENTS_PATH: /app/data/attachments
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
