version: '3.8'

services:
  lifeos:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - lifeos-data:/app/data
    environment:
      - AUTH_SECRET=${AUTH_SECRET:-changeme}
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/lifeos.db
      - ATTACHMENTS_PATH=/app/data/attachments
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lifeos-data:
    name: lifeos-data
